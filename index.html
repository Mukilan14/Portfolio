<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mukilan | Portfolio</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Base Reset */
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    /* Textured Light Background (Grid Theme Kept) */
    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background-color: #f8fafc;
      /* Faint developer grid background */
      background-image: 
        linear-gradient(to right, rgba(0, 0, 0, 0.03) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(0, 0, 0, 0.03) 1px, transparent 1px);
      background-size: 30px 30px;
      color: #334155;
      line-height: 1.6;
    }

    /* Frosted Glass Navbar - Desktop Default */
    .navbar {
      background: rgba(255, 255, 255, 0.8);
      backdrop-filter: blur(10px);
      border-bottom: 1px solid rgba(0,0,0,0.05);
      width: 100%;
      padding: 20px 8%;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .navbar-brand {
      font-size: 24px;
      font-weight: 800;
      color: #0f172a;
      text-decoration: none;
      letter-spacing: 0.5px;
    }

    .navbar-brand span {
      color: #2563eb;
    }

    .nav-links {
      display: flex;
      gap: 32px;
    }

    .nav-links a {
      text-decoration: none;
      color: #64748b;
      font-size: 15px;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 8px;
      transition: color 0.2s ease;
    }

    .nav-links a:hover {
      color: #2563eb;
    }

    /* Hamburger Menu Button (Hidden on Desktop) */
    .hamburger {
      display: none;
      font-size: 24px;
      color: #0f172a;
      cursor: pointer;
      transition: 0.3s;
    }

    .hamburger:hover {
      color: #2563eb;
    }

    /* Hero Section */
    .hero {
      display: grid;
      grid-template-columns: 1fr 1fr;
      align-items: center;
      gap: 60px;
      min-height: calc(100vh - 75px);
      padding: 0 10%;
      max-width: 1350px;
      margin: 0 auto;
    }

    /* Text Content */
    .hero-content {
      display: flex;
      flex-direction: column;
      align-items: flex-start;
    }

    /* Small Status Pill */
    .status-pill {
      background: #eff6ff;
      color: #2563eb;
      padding: 8px 16px;
      border-radius: 20px;
      font-size: 14px;
      font-weight: 600;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 20px;
      border: 1px solid #bfdbfe;
    }
    
    .status-dot {
      width: 8px;
      height: 8px;
      background: #3b82f6;
      border-radius: 50%;
    }

    .hero-content h1 {
      font-size: 64px;
      font-weight: 800;
      margin-bottom: 15px;
      line-height: 1.1;
      letter-spacing: -1px;
      /* Gradient Text */
      background: linear-gradient(135deg, #1e3a8a 0%, #3b82f6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .hero-content p {
      font-size: 20px;
      color: #475569;
      margin-bottom: 35px;
      font-weight: 500;
      max-width: 480px;
    }

    /* Social Links */
    .socials {
      display: flex;
      gap: 16px;
      margin-bottom: 45px;
    }

    .socials a {
      width: 54px;
      height: 54px;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 14px;
      background: #ffffff;
      border: 1px solid #e2e8f0;
      color: #64748b;
      font-size: 22px;
      text-decoration: none;
      box-shadow: 0 4px 10px rgba(0,0,0,0.03);
      transition: all 0.2s ease;
    }

    .socials a:hover {
      transform: translateY(-3px);
      box-shadow: 0 8px 15px rgba(0,0,0,0.08);
      color: #ffffff;
      border-color: transparent;
    }

    .socials a.github:hover { background: #1a1a1a; }
    .socials a.linkedin:hover { background: #0A66C2; }
    .socials a.gfg:hover { background: #2f8d46; }

    .gfg-icon {
      font-family: monospace;
      font-weight: 900;
      font-size: 18px;
      letter-spacing: -1px;
    }

    /* Resume Button */
    .resume-btn {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 16px 40px;
      background: #0f172a;
      color: #ffffff;
      font-size: 16px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 12px;
      transition: all 0.2s ease;
      box-shadow: 0 8px 20px rgba(15, 23, 42, 0.15);
    }

    .resume-btn:hover {
      background: #2563eb;
      box-shadow: 0 8px 25px rgba(37, 99, 235, 0.25);
    }

    /* Image Side - Clean Circular Professional Design */
    .hero-image {
      display: flex;
      justify-content: center;
      align-items: center;
    }

    .profile-img {
      width: 380px;
      height: 380px;
      object-fit: cover;
      border-radius: 50%; /* Perfect Circle */
      border: 8px solid #ffffff; /* Clean white border around the image */
      box-shadow: 0 20px 40px rgba(0,0,0,0.08); /* Soft professional shadow */
    }

    /* ==========================
       Responsive Mobile Design 
       ========================== */
    @media (max-width: 992px) {
      .navbar { 
        padding: 15px 5%; 
        position: relative; /* Setup for mobile dropdown */
      }
      
      /* Show hamburger icon */
      .hamburger {
        display: block;
      }

      /* Style nav-links for mobile dropdown */
      .nav-links { 
        position: absolute;
        top: 100%;
        left: -100%; /* Hide off-screen by default */
        width: 100%;
        background: rgba(255, 255, 255, 0.98);
        backdrop-filter: blur(15px);
        flex-direction: column;
        align-items: center;
        padding: 30px 0;
        gap: 25px;
        box-shadow: 0 10px 15px rgba(0,0,0,0.05);
        transition: left 0.3s ease-in-out;
        border-bottom: 1px solid rgba(0,0,0,0.05);
      }

      /* Class added by JS to slide the menu in */
      .nav-links.active {
        left: 0;
      }
      
      .hero {
        grid-template-columns: 1fr;
        text-align: center;
        padding: 40px 5%;
        gap: 50px;
      }

      .hero-content {
        align-items: center;
        order: 2;
      }

      .hero-image {
        order: 1;
        margin-top: 20px;
      }

      .profile-img {
        width: 280px;
        height: 280px;
      }

      .hero-content h1 { font-size: 42px; }
    }
  </style>
</head>
<body>

  <nav class="navbar">
    <a href="#" class="navbar-brand">Mukilan<span>.A</span></a>
    
    <div class="hamburger">
      <i class="fas fa-bars"></i>
    </div>

    <div class="nav-links">
      <a href="bio.html"><i class="fas fa-user"></i> Bio</a>
      <a href="skills.html"><i class="fas fa-lightbulb"></i> Skills</a>
      <a href="static.html"><i class="fas fa-project-diagram"></i> Projects</a>
      <a href="certificates.html"><i class="fas fa-award"></i> Certificates</a>
      <a href="tools.html"><i class="fas fa-wrench"></i> Tools</a>
    </div>
  </nav>

  <header class="hero">
    <div class="hero-content">
      <div class="status-pill">
        <div class="status-dot"></div>
        4th Year ECE
      </div>
      
      <h1>Mukilan A</h1>
      <p>Learning. Building. Solving. Growing.</p>
      
      <div class="socials">
        <a href="https://github.com/Mukilan14" target="_blank" title="GitHub" class="github">
          <i class="fab fa-github"></i>
        </a>
        <a href="https://www.linkedin.com/in/mukilan1403" target="_blank" title="LinkedIn" class="linkedin">
          <i class="fab fa-linkedin-in"></i>
        </a>
        <a href="https://www.geeksforgeeks.org/profile/mukilan_14" target="_blank" title="GeeksforGeeks" class="gfg">
          <span class="gfg-icon">GfG</span>
        </a>
      </div>

      <a href="MukilanResume.pdf" target="_blank" class="resume-btn">
        <i class="fas fa-file-download"></i> View Resume
      </a>
    </div>

    <div class="hero-image">
      <img src="profile photo.jpeg" alt="Mukilan A" class="profile-img">
    </div>
  </header>

  <script>
    const hamburger = document.querySelector('.hamburger');
    const navLinks = document.querySelector('.nav-links');
    const icon = hamburger.querySelector('i');

    hamburger.addEventListener('click', () => {
      // Toggle the menu open/close
      navLinks.classList.toggle('active');
      
      // Swap the icon between hamburger bars and an X
      if(navLinks.classList.contains('active')) {
        icon.classList.remove('fa-bars');
        icon.classList.add('fa-times');
      } else {
        icon.classList.remove('fa-times');
        icon.classList.add('fa-bars');
      }
    });
  </script>

</body>
</html>
